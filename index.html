<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mademoiselle in the Kitchen</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>Mademoiselle in the Kitchen</h1>
    <p class="subtitle">Catering • Madeleines • Miami</p>
  </header>

  <main class="container">
    <section class="card" id="menu">
      <h2>Menu</h2>

      <div class="menu-item">
        <span class="item-name">Classic Madeleines (12)</span>
        <span class="item-price">$15</span>
      </div>

      <div class="menu-item">
        <span class="item-name">Chocolate Madeleines (12)</span>
        <span class="item-price">$18</span>
      </div>

      <p class="note">Order via phone/text. 48h notice recommended.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
